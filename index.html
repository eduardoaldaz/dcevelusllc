<html lang="es">
<head>
<meta charset="UTF-8">

<meta name="keywords" content="exportador banano ecuador, banana export, piña ecuador, plátano barraganete, fruit exporter latin america, organic banana">
<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="DCEvel US — Exportadores de Frutas Premium desde Ecuador">
<meta property="og:description" content="Banano, plátano y piña premium de Ecuador al mundo. Calidad, sostenibilidad y confianza.">
<meta property="og:image" content="images/og-image.jpg">
<meta property="og:locale" content="es_EC">
<meta property="og:locale:alternate" content="en_US">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="images/favicon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ════════════ RESET ════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Sora',sans-serif;color:#1a1a1a;background:#fafaf7;overflow-x:hidden;line-height:1.6}
img{max-width:100%;display:block}a{text-decoration:none;color:inherit}ul{list-style:none}button{font-family:inherit;cursor:pointer}

/* ════════════ VARIABLES ════════════ */
:root{
  --g950:#064e3b;--g900:#022c22;--g800:#065f46;--g700:#047857;--g600:#059669;
  --g500:#10b981;--g400:#34d399;--g300:#6ee7b7;--g200:#a7f3d0;--g100:#d1fae5;--g50:#ecfdf5;
  --gold:#c9a84c;--gold-l:#f0dfa0;--dark:#0a1510;
  --serif:'Libre Baskerville',Georgia,serif;
  --sans:'Sora',sans-serif;
  --mw:1220px;
  --ease:cubic-bezier(.23,1,.32,1);
}

/* ════════════ UTILITIES ════════════ */
.wrap{max-width:var(--mw);margin:0 auto;padding:0 24px}
.tag{display:inline-block;padding:6px 18px;background:var(--g100);color:var(--g700);border-radius:50px;font-size:11px;font-weight:700;letter-spacing:2.5px;margin-bottom:16px}
.stitle{font-family:var(--serif);font-size:clamp(28px,5vw,48px);font-weight:700;line-height:1.12;color:var(--g950);margin-bottom:14px}
.ssub{font-size:16px;color:#666;line-height:1.75;max-width:560px}
.tc{text-align:center}.mx{margin-left:auto;margin-right:auto}

/* ════════════ ANIMATIONS ════════════ */
.r{opacity:0;transform:translateY(32px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
.r.l{transform:translateX(-32px)}.r.ri{transform:translateX(32px)}
.r.v{opacity:1;transform:translate(0)}
.d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}
.d4{transition-delay:.35s}.d5{transition-delay:.4s}.d6{transition-delay:.45s}

/* ════════════ BUTTONS ════════════ */
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:50px;font-size:14px;font-weight:600;letter-spacing:.3px;transition:all .35s var(--ease);border:none}
.bp{background:var(--g700);color:#fff}.bp:hover{background:var(--g600);transform:translateY(-2px);box-shadow:0 14px 32px rgba(22,163,74,.28)}
.bo{background:0;color:#fff;border:2px solid rgba(255,255,255,.35)}.bo:hover{background:rgba(255,255,255,.1);border-color:#fff;transform:translateY(-2px)}

/* ═══════════════════════════════════════════════
   NAVBAR
   ═══════════════════════════════════════════════ */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;transition:all .4s ease}
.nav.s{background:rgba(255,255,255,.97);backdrop-filter:blur(14px);box-shadow:0 1px 20px rgba(0,0,0,.06)}
.ni{display:flex;align-items:center;justify-content:space-between;height:68px}
.nlogo{font-family:var(--serif);font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px;transition:color .3s}
.nlogo-i{width:32px;height:32px;background:var(--g700);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px}
.nlogo .ac{color:var(--g500)}
.nlinks{display:flex;gap:28px}
.nlinks a{font-size:13px;font-weight:500;transition:color .3s;cursor:pointer;position:relative}
.nlinks a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:2px;background:var(--g500);transition:width .3s}
.nlinks a:hover::after{width:100%}
.nright{display:flex;align-items:center;gap:12px}
.lsw{display:flex;border-radius:24px;overflow:hidden;border:1.5px solid rgba(0,0,0,.1)}
.lbtn{padding:4px 11px;font-size:11px;font-weight:700;border:none;background:0;transition:all .3s;font-family:'Sora',sans-serif}
.lbtn.on{background:var(--g700);color:#fff}
.hbg{display:none;background:0;border:0;padding:6px;flex-direction:column;gap:5px}
.hbg span{display:block;width:21px;height:2px;transition:all .3s;border-radius:2px}
.mmenu{position:fixed;top:68px;left:0;right:0;background:#fff;padding:16px 24px;box-shadow:0 10px 40px rgba(0,0,0,.08);transform:translateY(-120%);transition:transform .4s ease;z-index:999}
.mmenu.open{transform:translateY(0)}
.mmenu a{display:block;padding:14px 0;font-size:15px;font-weight:500;color:var(--g950);border-bottom:1px solid #f2f2f2;cursor:pointer}
@media(max-width:900px){.nlinks{display:none}.hbg{display:flex}}

/* ═══════════════════════════════════════════════
   HERO
   ═══════════════════════════════════════════════ */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:linear-gradient(160deg,#ecfdf5 0%,#ffffff 40%,#f0fdfa 100%)}
.hero-bg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.18}
.hero-ov{position:absolute;inset:0;background:
  radial-gradient(ellipse at 70% 50%,rgba(34,197,94,.1),transparent 60%),
  radial-gradient(ellipse at 20% 80%,rgba(201,168,76,.06),transparent 50%)}
.hero-pat{position:absolute;inset:0;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E")}
.hero-c{position:relative;z-index:2;max-width:var(--mw);margin:0 auto;padding:130px 24px 80px;display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;width:100%}
.hero-tag{display:inline-block;padding:7px 18px;background:rgba(255,255,255,.07);color:var(--gold-l);border-radius:50px;font-size:11px;font-weight:700;letter-spacing:2.5px;margin-bottom:22px;border:1px solid rgba(255,255,255,.07)}
.hero h1{font-family:var(--serif);font-size:clamp(34px,5.2vw,58px);font-weight:700;color:#fff;line-height:1.08;margin-bottom:22px}
.hero .sub{font-size:17px;color:rgba(255,255,255,.62);line-height:1.75;max-width:490px;margin-bottom:34px}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}
.hero-vis{position:relative;display:flex;align-items:center;justify-content:center}
.hcard{width:280px;height:360px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:22px;overflow:hidden;backdrop-filter:blur(4px)}
.hcard img{width:100%;height:100%;object-fit:cover}
.hcard-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(22,101,52,.25),rgba(22,101,52,.08))}
.hcard-ph .em{font-size:96px;animation:fl 4s ease-in-out infinite}
.hcard-ph .lb{color:#fff;font-family:var(--serif);font-size:19px;margin-top:10px}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.hbadge{position:absolute;padding:9px 16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:16px;color:#fff;font-size:12px;font-weight:600;backdrop-filter:blur(6px);white-space:nowrap}
@media(max-width:900px){
  .hero-c{grid-template-columns:1fr;text-align:center;padding-top:115px}
  .hero .sub{margin:0 auto 34px}
  .hero-btns{justify-content:center}
  .hero-vis{display:none}
}

/* ═══════════════════════════════════════════════
   STATS
   ═══════════════════════════════════════════════ */
.stats{background:#fff;border-radius:24px;padding:36px 40px;max-width:1040px;margin:-46px auto 0;position:relative;z-index:10;box-shadow:0 18px 56px rgba(0,0,0,.06);display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.st-i{text-align:center}
.st-v{font-family:var(--serif);font-size:32px;font-weight:700;color:var(--g700)}
.st-l{font-size:12px;color:#999;margin-top:3px;font-weight:500;letter-spacing:.5px}
@media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr);margin:-30px 16px 0;padding:22px 18px}.st-v{font-size:26px}}

/* ═══════════════════════════════════════════════
   PRODUCTS
   ═══════════════════════════════════════════════ */
.prods{padding:110px 0}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:26px;margin-top:52px}
.pcard{background:#fff;border-radius:24px;overflow:hidden;border:1px solid #eee;transition:all .4s var(--ease)}
.pcard:hover{transform:translateY(-7px);box-shadow:0 22px 56px rgba(0,0,0,.08);border-color:var(--g300)}
.pimg{height:220px;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--g50),var(--g100))}
.pimg img{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease)}
.pcard:hover .pimg img{transform:scale(1.07)}
.pimg-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:76px;transition:transform .5s var(--ease)}
.pcard:hover .pimg-ph{transform:scale(1.12) rotate(-4deg)}
.pbody{padding:24px}
.pname{font-family:var(--serif);font-size:19px;font-weight:700;color:var(--g950);margin-bottom:10px}
.pdesc{font-size:13px;color:#777;line-height:1.7;margin-bottom:16px}
.pfeats{display:flex;flex-wrap:wrap;gap:6px}
.pfeat{padding:4px 11px;background:var(--g50);color:var(--g700);border-radius:50px;font-size:10.5px;font-weight:600}
@media(max-width:900px){.pgrid{grid-template-columns:1fr;max-width:420px;margin:52px auto 0}}

/* ═══════════════════════════════════════════════
   ABOUT
   ═══════════════════════════════════════════════ */
.about{padding:110px 0;background:var(--g950);color:#fff;position:relative;overflow:hidden}
.about::before{content:'';position:absolute;top:-40%;right:-12%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(34,197,94,.06),transparent 70%)}
.about-in{display:grid;grid-template-columns:1fr 1fr;gap:68px;align-items:center}
.about .tag{background:rgba(255,255,255,.07);color:var(--g300)}
.about .stitle{color:#fff}
.about-txt p{color:rgba(255,255,255,.68);line-height:1.8;margin-bottom:14px;font-size:15px}
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.vcard{padding:22px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.055);border-radius:20px;transition:all .3s ease}
.vcard:hover{background:rgba(255,255,255,.06);transform:translateY(-3px)}
.vic{font-size:24px;margin-bottom:8px}
.vtit{font-family:var(--serif);font-size:15px;font-weight:600;color:#fff;margin-bottom:5px}
.vdesc{font-size:12px;color:rgba(255,255,255,.5);line-height:1.6}
@media(max-width:900px){.about-in{grid-template-columns:1fr;gap:36px}}
@media(max-width:600px){.vgrid{grid-template-columns:1fr}}

/* ═══════════════════════════════════════════════
   PROCESS
   ═══════════════════════════════════════════════ */
.proc{padding:110px 0}
.prgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:52px}
.prcard{padding:30px 22px;border-radius:24px;border:1px solid #eee;background:#fff;position:relative;overflow:hidden;transition:all .4s ease}
.prcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--g400),var(--gold));opacity:0;transition:opacity .3s}
.prcard:hover{transform:translateY(-5px);box-shadow:0 14px 36px rgba(0,0,0,.06)}
.prcard:hover::before{opacity:1}
.prnum{font-family:var(--serif);font-size:38px;font-weight:700;color:var(--g200);margin-bottom:12px}
.prtit{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--g950);margin-bottom:8px}
.prdesc{font-size:13px;color:#777;line-height:1.7}
@media(max-width:900px){.prgrid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.prgrid{grid-template-columns:1fr}}

/* ═══════════════════════════════════════════════
   GALLERY
   ═══════════════════════════════════════════════ */
.gal{padding:110px 0;background:var(--g50)}
.ggrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:52px}
.gitem{aspect-ratio:4/3;border-radius:20px;overflow:hidden;position:relative;cursor:pointer;transition:transform .4s ease}
.gitem:hover{transform:scale(1.015)}
.gitem img{width:100%;height:100%;object-fit:cover}
.gitem-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#fff;font-weight:600;font-size:14px}
.gitem::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.5));opacity:0;transition:opacity .3s}
.gitem:hover::after{opacity:1}
.gcap{position:absolute;bottom:14px;left:14px;color:#fff;font-size:13px;font-weight:600;z-index:2;opacity:0;transform:translateY(8px);transition:all .3s}
.gitem:hover .gcap{opacity:1;transform:translateY(0)}
@media(max-width:768px){.ggrid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.ggrid{grid-template-columns:1fr}}

/* ═══════════════════════════════════════════════
   CERTIFICATIONS
   ═══════════════════════════════════════════════ */
.certs{padding:52px 24px;background:#fff;text-align:center}
.certs-row{display:flex;justify-content:center;gap:32px;flex-wrap:wrap;margin-top:20px}
.cbadge{width:74px;height:74px;border-radius:50%;background:var(--g50);border:2px solid var(--g200);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--g700);text-align:center;padding:7px;line-height:1.2;transition:all .3s}
.cbadge:hover{background:var(--g100);transform:scale(1.08)}

/* ═══════════════════════════════════════════════
   CONTACT
   ═══════════════════════════════════════════════ */
.contact{padding:110px 0}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:52px;margin-top:52px}
.cform{display:flex;flex-direction:column;gap:16px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fin{width:100%;padding:13px 17px;border:1.5px solid #e0e0e0;border-radius:16px;font-size:14px;font-family:'Sora',sans-serif;transition:all .3s;background:#fff;color:#1a1a1a;outline:0}
.fin:focus{border-color:var(--g500);box-shadow:0 0 0 3px rgba(34,197,94,.1)}
.fin::placeholder{color:#bbb}
textarea.fin{min-height:125px;resize:vertical}
.cinfo{display:flex;flex-direction:column;gap:20px}
.icard{padding:22px;background:var(--g50);border-radius:16px;display:flex;align-items:flex-start;gap:14px}
.iicon{width:42px;height:42px;background:var(--g700);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;flex-shrink:0}
.ilab{font-weight:700;color:var(--g950);font-size:12px;margin-bottom:2px}
.ival{color:#666;font-size:14px}
.hcard2{padding:18px 22px;background:var(--g950);border-radius:16px;color:#fff}
.hcard2 b{font-size:12px;display:block;margin-bottom:6px}
.hcard2 span{font-size:12px;opacity:.7;line-height:1.7}
.fok{display:none;padding:18px;background:var(--g50);border:2px solid var(--g400);border-radius:16px;text-align:center;color:var(--g700);font-weight:600}
.fok.show{display:block}
@media(max-width:900px){.cgrid{grid-template-columns:1fr}}
@media(max-width:600px){.frow{grid-template-columns:1fr}}

/* ═══════════════════════════════════════════════
   FOOTER
   ═══════════════════════════════════════════════ */
.ft{background:#022c22;border-radius:32px 32px 0 0;color:rgba(255,255,255,.6);padding:68px 24px 24px}
.ft-in{max-width:var(--mw);margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px}
.ft-logo{font-family:var(--serif);font-size:20px;font-weight:700;color:#fff;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.ft-logo .fi{width:28px;height:28px;background:var(--g700);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px}
.ft-logo .ac{color:var(--g500)}
.ft-desc{font-size:12px;line-height:1.7;max-width:280px}
.ft-t{color:#fff;font-weight:700;font-size:11px;margin-bottom:16px;letter-spacing:1.5px;text-transform:uppercase}
.ft-links li{margin-bottom:9px}
.ft-links a{font-size:12px;color:rgba(255,255,255,.5);transition:color .3s;cursor:pointer}
.ft-links a:hover{color:var(--g400)}
.ft-bot{max-width:var(--mw);margin:36px auto 0;padding-top:18px;border-top:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.ft-copy{font-size:11px;color:rgba(255,255,255,.3)}
.ft-soc{display:flex;gap:8px}
.ft-soc a{width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(255,255,255,.4);transition:all .3s}
.ft-soc a:hover{background:var(--g700);border-color:var(--g700);color:#fff}
@media(max-width:900px){.ft-in{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.ft-in{grid-template-columns:1fr}}

/* ═══════════════════════════════════════════════
   WHATSAPP
   ═══════════════════════════════════════════════ */
.wa{position:fixed;bottom:22px;right:22px;z-index:999;width:56px;height:56px;border-radius:50%;background:#25d366;color:#fff;border:0;display:flex;align-items:center;justify-content:center;font-size:25px;box-shadow:0 5px 22px rgba(37,211,102,.35);transition:all .3s;animation:pwa 2.5s infinite}
.wa:hover{transform:scale(1.1);box-shadow:0 8px 32px rgba(37,211,102,.45)}
@keyframes pwa{0%,100%{box-shadow:0 5px 22px rgba(37,211,102,.35)}50%{box-shadow:0 5px 36px rgba(37,211,102,.55)}}

/* ════════════ LIGHTBOX ════════════ */
.lb{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;padding:32px;backdrop-filter:blur(4px)}
.lb.open{display:flex}
.lb img{max-width:90vw;max-height:85vh;border-radius:10px;object-fit:contain}
.lb-x{position:absolute;top:18px;right:22px;color:#fff;font-size:30px;background:0;border:0;cursor:pointer;opacity:.7;transition:opacity .3s}
.lb-x:hover{opacity:1}
</style>
</head>
<body>

<!-- ═══ NAVBAR ═══ -->
<nav class="nav" id="nav">
  <div class="wrap ni">
    <a class="nlogo" href="#home" id="nlogo"><img id="nlogo-img" src="" alt="" style="height:36px;display:none"><span id="nlogo-txt"><span class="nlogo-i" style="background:var(--g500)">🌎</span><span>DCEvel <b style="color:var(--g500)">US</b></span></span></a>
    <ul class="nlinks" id="nlinks"></ul>
    <div class="nright">
      <div class="lsw">
        <button class="lbtn on" id="bEs" onclick="setL('es')">ES</button>
        <button class="lbtn" id="bEn" onclick="setL('en')">EN</button>
      </div>
      <button class="hbg" id="hbg" onclick="togM()"><span id="h1"></span><span id="h2"></span><span id="h3"></span></button>
    </div>
  </div>
  <div class="mmenu" id="mm"></div>
</nav>

<!-- ═══ HERO ═══ -->
<section class="hero" id="home">
  <div class="hero-bg"><img id="himg" src="" alt=""><div class="hero-ov"></div><div class="hero-pat"></div></div>
  <div class="hero-c">
    <div>
      <div class="hero-tag r" id="htag"></div>
      <h1 class="r d1" id="htit"></h1>
      <p class="sub r d2" id="hsub"></p>
      <div class="hero-btns r d3">
        <a class="btn bp" href="#products" id="hb1"></a>
        <a class="btn bo" href="#contact" id="hb2"></a>
      </div>
    </div>
    <div class="hero-vis">
      <div class="hcard" id="hcard"><div class="hcard-ph"><span class="em">🍌</span><span class="lb">Premium Banana</span></div></div>
      <div class="hbadge" style="top:8%;right:-6%">🌍 30+ <span id="hcountry"></span></div>
      <div class="hbadge" style="bottom:16%;left:-6%">✅ Global G.A.P.</div>
    </div>
  </div>
</section>

<!-- ═══ STATS ═══ -->
<div style="padding:0 24px"><div class="stats r" id="stats"></div></div>

<!-- ═══ PRODUCTS ═══ -->
<section class="prods" id="products">
  <div class="wrap">
    <div class="tc"><div class="tag r" id="ptag"></div><h2 class="stitle r d1" id="ptit"></h2><p class="ssub mx r d2" id="psub"></p></div>
    <div class="pgrid" id="pgrid"></div>
  </div>
</section>

<!-- ═══ ABOUT ═══ -->
<section class="about" id="about">
  <div class="wrap about-in">
    <div class="r l">
      <div class="tag" id="atag"></div>
      <h2 class="stitle" id="atit"></h2>
      <div class="about-txt" id="atxt"></div>
    </div>
    <div class="vgrid" id="vgrid"></div>
  </div>
</section>

<!-- ═══ PROCESS ═══ -->
<section class="proc" id="process">
  <div class="wrap">
    <div class="tc"><div class="tag r" id="prtag"></div><h2 class="stitle r d1" id="prtit"></h2><p class="ssub mx r d2" id="prsub"></p></div>
    <div class="prgrid" id="prgrid"></div>
  </div>
</section>

<!-- ═══ GALLERY ═══ -->
<section class="gal" id="gallery">
  <div class="wrap">
    <div class="tc"><div class="tag r" id="gtag"></div><h2 class="stitle r d1" id="gtit"></h2><p class="ssub mx r d2" id="gsub"></p></div>
    <div class="ggrid" id="ggrid"></div>
  </div>
</section>

<!-- ═══ CERTS ═══ -->
<div class="certs r"><div class="tag">CERTIFICACIONES</div><div class="certs-row" id="certs"></div></div>

<!-- ═══ CONTACT ═══ -->
<section class="contact" id="contact">
  <div class="wrap">
    <div class="tc"><div class="tag r" id="ctag"></div><h2 class="stitle r d1" id="ctit"></h2><p class="ssub mx r d2" id="csub"></p></div>
    <div class="cgrid">
      <div class="r l">
        <form class="cform" id="cform" onsubmit="return sendForm(event)">
          <div class="frow"><input class="fin" name="name" required id="fn"><input class="fin" name="email" type="email" required id="fe"></div>
          <div class="frow"><input class="fin" name="company" id="fc"><input class="fin" name="country" id="fco"></div>
          <textarea class="fin" name="message" required id="fm"></textarea>
          <button type="submit" class="btn bp" style="align-self:flex-start" id="fsend"></button>
        </form>
        <div class="fok" id="fok"></div>
      </div>
      <div class="cinfo r ri" id="cinfo"></div>
    </div>
  </div>
</section>

<!-- ═══ FOOTER ═══ -->
<footer class="ft">
  <div class="ft-in">
    <div><div class="ft-logo" id="ft-logo"><span class="fi" style="background:var(--g500)">🌎</span>DCEvel <b style="color:var(--g400)">US</b></div><p class="ft-desc" id="fdesc"></p></div>
    <div><div class="ft-t" id="flt"></div><ul class="ft-links" id="flinks"></ul></div>
    <div><div class="ft-t" id="fct"></div><ul class="ft-links" id="fclinks"></ul></div>
    <div><div class="ft-t">Certificaciones</div><ul class="ft-links" id="fcerts"></ul></div>
  </div>
  <div class="ft-bot"><span class="ft-copy">&copy; 2026 DCEvel US LLC. <span id="frights"></span></span><div class="ft-soc" id="fsoc"></div></div>
</footer>

<!-- ═══ WHATSAPP ═══ -->
<a class="wa" id="wa" target="_blank" rel="noopener" title="WhatsApp">💬</a>

<!-- ═══ LIGHTBOX ═══ -->
<div class="lb" id="lbox" onclick="clsLb()"><button class="lb-x" onclick="clsLb()">×</button><img id="lbimg" src="" alt=""></div>

<script>
/* ════════════════════════════════════════════════
   DCEvel US — Todo se carga desde content.json
   Para editar el sitio, edita content.json y ya.
   ════════════════════════════════════════════════ */
let D,L=localStorage.getItem('lang')||'en';
const NAV={es:{home:'Inicio',products:'Productos',about:'Nosotros',process:'Proceso',gallery:'Galería',contact:'Contacto'},en:{home:'Home',products:'Products',about:'About Us',process:'Process',gallery:'Gallery',contact:'Contact'}};
const UI={es:{countries:'Países',links:'Enlaces rápidos',contacto:'Contacto',rights:'Todos los derechos reservados.',hours:'Horario de atención',htxt:'Lun–Vie: 8:00–17:00<br>Sáb: 9:00–13:00',ok:'¡Mensaje enviado! Te contactaremos pronto.',wa:'¡Hola! Estoy interesado en sus productos de exportación.',fn:'Nombre completo',fe:'Correo electrónico',fc:'Empresa',fco:'País',fm:'Mensaje',fs:'Enviar mensaje →',dir:'Dirección',tel:'Teléfono'},en:{countries:'Countries',links:'Quick Links',contacto:'Contact',rights:'All rights reserved.',hours:'Business hours',htxt:'Mon–Fri: 8:00 AM–5:00 PM<br>Sat: 9:00 AM–1:00 PM',ok:'Message sent! We\'ll contact you soon.',wa:'Hello! I\'m interested in your export products.',fn:'Full name',fe:'Email',fc:'Company',fco:'Country',fm:'Message',fs:'Send message →',dir:'Address',tel:'Phone'}};
const GC=['#1b4332','#2d6a4f','#40916c','#52b788','#386641','#588157'],GI=['🌿','👨‍🌾','🔍','📦','🚢','✈️'];

function t(o){return o?(o[L]||o.es||o.en||''):''}

/* ─── LOAD ─── */
fetch('content.json?_='+Date.now()).then(r=>r.json()).then(d=>{D=d;render()}).catch(e=>console.error('Error cargando content.json:',e));

/* ─── LANG ─── */
function setL(l){L=l;localStorage.setItem('lang',l);document.documentElement.lang=l;$('bEs').className='lbtn'+(l==='es'?' on':'');$('bEn').className='lbtn'+(l==='en'?' on':'');render()}

/* ─── RENDER ─── */
function render(){
  if(!D)return;
  const u=UI[L],n=NAV[L],secs=['home','products','about','process','gallery','contact'];

  // Nav
  $('nlinks').innerHTML=secs.map(s=>`<li><a href="#${s}" onclick="clsM()">${n[s]}</a></li>`).join('');
  $('mm').innerHTML=secs.map(s=>`<a href="#${s}" onclick="clsM()">${n[s]}</a>`).join('');

  // Logo (si hay imagen en content.json la usa, si no muestra texto)
  if(D.empresa.logo&&imgExists(D.empresa.logo)){
    $('nlogo-img').src=D.empresa.logo;$('nlogo-img').alt=D.empresa.nombre;$('nlogo-img').style.display='block';$('nlogo-txt').style.display='none';
    $('ft-logo').innerHTML=`<img src="${D.empresa.logo}" alt="${D.empresa.nombre}" style="height:30px">`;
  }
  // Hero
  $('htag').textContent=t(D.hero.etiqueta);
  $('htit').textContent=t(D.hero.titulo);
  $('hsub').textContent=t(D.hero.subtitulo);
  $('hb1').textContent=t(D.hero.boton1)+' →';
  $('hb2').textContent=t(D.hero.boton2);
  tryImg('himg',D.hero.imagen);
  $('hcountry').textContent=u.countries;

  // Hero card
  const fp=D.productos.lista[0];
  if(fp&&fp.imagen&&imgExists(fp.imagen)){$('hcard').innerHTML=`<img src="${fp.imagen}" alt="${t(fp.nombre)}">`}

  // Stats
  $('stats').innerHTML=D.estadisticas.map(s=>`<div class="st-i"><div class="st-v">${s.valor}</div><div class="st-l">${t(s.texto)}</div></div>`).join('');

  // Products
  $('ptag').textContent=t(D.productos.etiqueta);
  $('ptit').textContent=t(D.productos.titulo);
  $('psub').textContent=t(D.productos.subtitulo);
  $('pgrid').innerHTML=D.productos.lista.map((p,i)=>{
    const hasI=imgExists(p.imagen);
    return`<div class="pcard r d${i+1}"><div class="pimg">${hasI?`<img src="${p.imagen}" alt="${t(p.nombre)}" loading="lazy">`:`<div class="pimg-ph">${p.emoji||'🍎'}</div>`}</div><div class="pbody"><h3 class="pname">${t(p.nombre)}</h3><p class="pdesc">${t(p.descripcion)}</p><div class="pfeats">${p.caracteristicas.map(f=>`<span class="pfeat">${t(f)}</span>`).join('')}</div></div></div>`}).join('');

  // About
  $('atag').textContent=t(D.nosotros.etiqueta);
  $('atit').textContent=t(D.nosotros.titulo);
  $('atxt').innerHTML=D.nosotros.parrafos.map(p=>`<p>${t(p)}</p>`).join('');
  $('vgrid').innerHTML=D.nosotros.valores.map((v,i)=>`<div class="vcard r ri d${i+1}"><div class="vic">${v.icono}</div><div class="vtit">${t(v.titulo)}</div><div class="vdesc">${t(v.desc)}</div></div>`).join('');

  // Process
  $('prtag').textContent=t(D.proceso.etiqueta);
  $('prtit').textContent=t(D.proceso.titulo);
  $('prsub').textContent=t(D.proceso.subtitulo);
  $('prgrid').innerHTML=D.proceso.pasos.map((s,i)=>`<div class="prcard r d${i+1}"><div class="prnum">${s.num}</div><h3 class="prtit">${t(s.titulo)}</h3><p class="prdesc">${t(s.desc)}</p></div>`).join('');

  // Gallery
  $('gtag').textContent=t(D.galeria.etiqueta);
  $('gtit').textContent=t(D.galeria.titulo);
  $('gsub').textContent=t(D.galeria.subtitulo);
  $('ggrid').innerHTML=D.galeria.imagenes.map((g,i)=>{
    const c=GC[i%6],hasI=imgExists(g.src);
    return`<div class="gitem r d${(i%3)+1}" onclick="opLb('${hasI?g.src:''}')">${hasI?`<img src="${g.src}" alt="${t(g.texto)}" loading="lazy">`:`<div class="gitem-ph" style="background:linear-gradient(135deg,${c},${c}dd)"><span style="font-size:40px">${GI[i]||'🍃'}</span></div>`}<div class="gcap">${t(g.texto)}</div></div>`}).join('');

  // Certs
  $('certs').innerHTML=(D.certificaciones||[]).map(c=>`<div class="cbadge">${c}</div>`).join('');

  // Contact
  $('ctag').textContent=t(D.contacto.etiqueta);
  $('ctit').textContent=t(D.contacto.titulo);
  $('csub').textContent=t(D.contacto.subtitulo);
  $('fn').placeholder=u.fn;$('fe').placeholder=u.fe;$('fc').placeholder=u.fc;$('fco').placeholder=u.fco;$('fm').placeholder=u.fm;$('fsend').textContent=u.fs;$('fok').textContent=u.ok;

  $('cinfo').innerHTML=`
    <div class="icard"><div class="iicon">📍</div><div><div class="ilab">${u.dir}</div><div class="ival">${t(D.empresa.direccion)}</div></div></div>
    <div class="icard"><div class="iicon">📞</div><div><div class="ilab">${u.tel}</div><div class="ival">${D.empresa.telefono}</div></div></div>
    <div class="icard"><div class="iicon">✉️</div><div><div class="ilab">Email</div><div class="ival">${D.empresa.email}</div></div></div>
    <div class="hcard2"><b>🕐 ${u.hours}</b><span>${u.htxt}</span></div>`;

  // Footer
  $('fdesc').textContent=t(D.nosotros.parrafos[0]);
  $('flt').textContent=u.links;
  $('flinks').innerHTML=secs.map(s=>`<li><a href="#${s}">${n[s]}</a></li>`).join('');
  $('fct').textContent=u.contacto;
  $('fclinks').innerHTML=`<li><a>${t(D.empresa.direccion)}</a></li><li><a href="tel:${D.empresa.telefono}">${D.empresa.telefono}</a></li><li><a href="mailto:${D.empresa.email}">${D.empresa.email}</a></li>`;
  $('fcerts').innerHTML=(D.certificaciones||[]).slice(0,4).map(c=>`<li><a>${c}</a></li>`).join('');
  $('frights').textContent=u.rights;
  const so=D.empresa.redes||{};
  $('fsoc').innerHTML=(so.facebook?`<a href="${so.facebook}" target="_blank" rel="noopener">f</a>`:'')+(so.instagram?`<a href="${so.instagram}" target="_blank" rel="noopener">ig</a>`:'')+(so.linkedin?`<a href="${so.linkedin}" target="_blank" rel="noopener">in</a>`:'');

  // WhatsApp
  $('wa').href=`https://wa.me/${D.empresa.whatsapp||'593412345678'}?text=${encodeURIComponent(u.wa)}`;

  obs();
}

/* ─── HELPERS ─── */
function $(id){return document.getElementById(id)}
function imgExists(src){return src&&!src.match(/\.(jpg|png|webp)$/) ? false : !!src}
function tryImg(id,src){if(src) $(id).src=src}

/* ─── NAV SCROLL ─── */
window.addEventListener('scroll',()=>{
  const s=scrollY>50,nav=$('nav');
  nav.classList.toggle('s',s);
  $('nlogo').style.color=s?'var(--g950)':'#fff';
  document.querySelectorAll('.nlinks a').forEach(a=>a.style.color=s?'#333':'rgba(255,255,255,.85)');
  document.querySelectorAll('.hbg span').forEach(b=>b.style.background=s?'#333':'#fff');
  document.querySelectorAll('.lbtn:not(.on)').forEach(b=>b.style.color=s?'#333':'#fff');
  document.querySelector('.lsw').style.borderColor=s?'rgba(0,0,0,.1)':'rgba(255,255,255,.25)';
});

/* ─── MOBILE MENU ─── */
let mo=false;
function togM(){mo=!mo;$('mm').classList.toggle('open',mo);$('h1').style.transform=mo?'rotate(45deg) translate(5px,5px)':'';$('h2').style.opacity=mo?'0':'1';$('h3').style.transform=mo?'rotate(-45deg) translate(5px,-5px)':''}
function clsM(){if(mo)togM()}

/* ─── SCROLL REVEAL ─── */
function obs(){
  const o=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('v');o.unobserve(e.target)}})},{threshold:.1});
  document.querySelectorAll('.r:not(.v)').forEach(el=>o.observe(el));
}

/* ─── LIGHTBOX ─── */
function opLb(s){if(!s)return;$('lbimg').src=s;$('lbox').classList.add('open');document.body.style.overflow='hidden'}
function clsLb(){$('lbox').classList.remove('open');document.body.style.overflow=''}

/* ─── CONTACT FORM → WhatsApp ─── */
function sendForm(e){
  e.preventDefault();
  const f=e.target,fd=new FormData(f);
  const msg=`*Nuevo contacto web*%0A👤 ${fd.get('name')}%0A📧 ${fd.get('email')}%0A🏢 ${fd.get('company')||'—'}%0A🌍 ${fd.get('country')||'—'}%0A💬 ${fd.get('message')}`;
  window.open(`https://wa.me/${D.empresa.whatsapp}?text=${msg}`,'_blank');
  f.style.display='none';$('fok').classList.add('show');
  return false;
}
</script>
</body>
</html>
