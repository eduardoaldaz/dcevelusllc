<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DCEvel US LLC — Tropical Fruit Import & Distribution | Miami</title>
<meta name="description" content="DCEvel US LLC: Premium tropical fruit import and distribution from Ecuador to the United States. Banana, plantain and pineapple wholesale.">
<meta property="og:type" content="website">
<meta property="og:title" content="DCEvel US LLC — Tropical Fruit Import & Distribution">
<meta property="og:description" content="Premium tropical fruit import from Ecuador. Wholesale distribution across the US.">
<meta property="og:image" content="images/og-image.jpg">
<meta property="og:locale" content="en_US">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="images/favicon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Sora',sans-serif;color:#1e293b;background:#ffffff;overflow-x:hidden;line-height:1.6}
img{max-width:100%;display:block}a{text-decoration:none;color:inherit}ul{list-style:none}button{font-family:inherit;cursor:pointer}
:root{
  --b700:#0e4d6e;--b600:#0d6998;--b500:#0e8cc2;--b400:#35a8d8;--b300:#7cc8e8;--b200:#bee4f4;--b100:#e0f3fb;--b50:#f0f9ff;
  --t600:#0d7263;--t500:#10a090;--t400:#38c5b0;
  --bg:#ffffff;--bg2:#f8fafc;--bg3:#f1f5f9;
  --txt:#0f172a;--txt2:#475569;--txt3:#94a3b8;
  --serif:'Libre Baskerville',Georgia,serif;
  --sans:'Sora',sans-serif;
  --mw:1200px;--ease:cubic-bezier(.23,1,.32,1);--rad:14px;
}
.wrap{max-width:var(--mw);margin:0 auto;padding:0 28px}
.tag{display:inline-block;padding:7px 18px;background:var(--b100);color:var(--b600);border-radius:50px;font-size:11px;font-weight:600;letter-spacing:1.5px;margin-bottom:16px}
.stitle{font-family:var(--serif);font-size:clamp(28px,4.5vw,44px);font-weight:700;line-height:1.15;color:var(--txt);margin-bottom:14px}
.ssub{font-size:15px;color:var(--txt2);line-height:1.8;max-width:540px;font-weight:400}
.tc{text-align:center}.mx{margin-left:auto;margin-right:auto}
.r{opacity:0;transform:translateY(28px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
.r.l{transform:translateX(-28px)}.r.ri{transform:translateX(28px)}
.r.v{opacity:1;transform:translate(0)}
.d1{transition-delay:.1s}.d2{transition-delay:.18s}.d3{transition-delay:.24s}.d4{transition-delay:.3s}.d5{transition-delay:.35s}.d6{transition-delay:.4s}
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:50px;font-size:14px;font-weight:600;transition:all .35s var(--ease);border:none}
.bp{background:var(--b600);color:#fff}.bp:hover{background:var(--b500);transform:translateY(-2px);box-shadow:0 12px 28px rgba(14,105,152,.25)}
.bo{background:var(--bg);color:var(--b600);border:2px solid var(--b200)}.bo:hover{border-color:var(--b400);background:var(--b50);transform:translateY(-2px)}

/* ═══ NAV ═══ */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;transition:all .4s}
.nav.s{background:rgba(255,255,255,.96);backdrop-filter:blur(16px);box-shadow:0 1px 16px rgba(0,0,0,.04)}
.ni{display:flex;align-items:center;justify-content:space-between;height:68px}
.nlogo{font-family:var(--sans);font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px;color:var(--txt);transition:color .3s}
.nlogo img{height:36px;display:none}
.nlogo .dot{width:10px;height:10px;background:var(--b500);border-radius:50%;display:inline-block}
.nlogo span b{color:var(--b600)}
.nlinks{display:flex;gap:28px}
.nlinks a{font-size:13px;font-weight:500;color:var(--txt2);transition:color .3s;cursor:pointer}
.nlinks a:hover{color:var(--b600)}
.nright{display:flex;align-items:center;gap:12px}
.lsw{display:flex;border-radius:20px;overflow:hidden;border:2px solid var(--bg3)}
.lbtn{padding:4px 12px;font-size:11px;font-weight:600;border:none;background:transparent;color:var(--txt3);transition:all .3s;font-family:var(--sans)}
.lbtn.on{background:var(--b600);color:#fff}
.hbg{display:none;background:none;border:0;padding:6px;flex-direction:column;gap:5px}
.hbg span{display:block;width:22px;height:2px;background:var(--txt);border-radius:2px;transition:all .3s}
.mmenu{position:fixed;top:68px;left:0;right:0;background:#fff;padding:16px 28px;box-shadow:0 8px 30px rgba(0,0,0,.06);transform:translateY(-120%);transition:transform .4s;z-index:999;border-radius:0 0 var(--rad) var(--rad)}
.mmenu.open{transform:translateY(0)}
.mmenu a{display:block;padding:13px 0;font-size:15px;font-weight:500;color:var(--txt);border-bottom:1px solid var(--bg3);cursor:pointer}
@media(max-width:900px){.nlinks{display:none}.hbg{display:flex}}

/* ═══ HERO ═══ */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;background:linear-gradient(135deg,var(--b50) 0%,#fff 40%,var(--bg2) 100%);overflow:hidden}
.hero-shapes{position:absolute;inset:0;overflow:hidden}
.hero-shapes .c1{position:absolute;top:-10%;right:-5%;width:500px;height:500px;border-radius:50%;background:var(--b100);opacity:.6}
.hero-shapes .c2{position:absolute;bottom:-15%;right:20%;width:300px;height:300px;border-radius:50%;background:var(--b50);opacity:.8}
.hero-shapes .c3{position:absolute;top:30%;left:-8%;width:200px;height:200px;border-radius:50%;border:2px solid var(--b200)}
.hero-c{position:relative;z-index:2;max-width:var(--mw);margin:0 auto;padding:130px 28px 90px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;width:100%}
.hero-tag{display:inline-block;padding:8px 20px;background:var(--b100);color:var(--b600);border-radius:50px;font-size:11px;font-weight:600;letter-spacing:1.5px;margin-bottom:22px}
.hero h1{font-family:var(--serif);font-size:clamp(32px,5vw,52px);font-weight:700;color:var(--txt);line-height:1.1;margin-bottom:22px}
.hero h1 span{color:var(--b600)}
.hero .sub{font-size:16px;color:var(--txt2);line-height:1.8;max-width:480px;margin-bottom:36px}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}
.hero-vis{position:relative}
.hcard{width:100%;max-width:400px;border-radius:var(--rad);overflow:hidden;box-shadow:0 24px 60px rgba(14,105,152,.12);border:1px solid var(--b200);margin:0 auto}
.hcard img{width:100%;aspect-ratio:4/5;object-fit:cover}
.hcard-ph{width:100%;aspect-ratio:4/5;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--b50),var(--b100))}
.hcard-ph .em{font-size:90px;animation:fl 4s ease-in-out infinite}
.hcard-ph .lb{color:var(--b600);font-family:var(--serif);font-size:18px;font-style:italic;margin-top:10px}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.hcard-badge{position:absolute;padding:10px 16px;background:#fff;border-radius:var(--rad);box-shadow:0 8px 24px rgba(0,0,0,.08);color:var(--b600);font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.hcard-badge .bdot{width:8px;height:8px;border-radius:50%;background:var(--t500)}
@media(max-width:900px){.hero-c{grid-template-columns:1fr;text-align:center;padding-top:115px}.hero .sub{margin:0 auto 36px}.hero-btns{justify-content:center}.hero-vis{display:none}}

/* ═══ STATS ═══ */
.stats{background:#fff;border-radius:var(--rad);padding:36px 40px;max-width:1040px;margin:-44px auto 0;position:relative;z-index:10;box-shadow:0 16px 48px rgba(0,0,0,.04);border:1px solid var(--bg3);display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.st-i{text-align:center}
.st-v{font-family:var(--serif);font-size:32px;font-weight:700;color:var(--b600)}
.st-l{font-size:12px;color:var(--txt3);margin-top:3px;font-weight:500}
@media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr);margin:-30px 16px 0;padding:24px}.st-v{font-size:26px}}

/* ═══ PRODUCTS ═══ */
.prods{padding:110px 0}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:54px}
.pcard{background:#fff;border-radius:var(--rad);overflow:hidden;border:1px solid var(--bg3);transition:all .4s var(--ease)}
.pcard:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(14,105,152,.1);border-color:var(--b300)}
.pimg{height:220px;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--b50),var(--b100))}
.pimg img{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease)}
.pcard:hover .pimg img{transform:scale(1.06)}
.pimg-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:74px;transition:transform .5s var(--ease)}
.pcard:hover .pimg-ph{transform:scale(1.1) rotate(-3deg)}
.pbody{padding:24px}
.pname{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--txt);margin-bottom:10px}
.pdesc{font-size:13px;color:var(--txt2);line-height:1.75;margin-bottom:16px}
.pfeats{display:flex;flex-wrap:wrap;gap:6px}
.pfeat{padding:5px 12px;background:var(--b50);color:var(--b600);border-radius:50px;font-size:10.5px;font-weight:600}
@media(max-width:900px){.pgrid{grid-template-columns:1fr;max-width:420px;margin:54px auto 0}}

/* ═══ ABOUT ═══ */
.about{padding:110px 0;background:var(--b700);color:#fff;position:relative;overflow:hidden;border-radius:40px;margin:0 20px}
.about::before{content:'';position:absolute;top:-30%;right:-10%;width:400px;height:400px;border-radius:50%;background:rgba(255,255,255,.03)}
.about-in{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}
.about .tag{background:rgba(255,255,255,.08);color:var(--b300)}
.about .stitle{color:#fff}
.about-txt p{color:rgba(255,255,255,.7);line-height:1.8;margin-bottom:14px;font-size:15px}
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.vcard{padding:22px;background:rgba(255,255,255,.05);border-radius:var(--rad);border:1px solid rgba(255,255,255,.06);transition:all .3s}
.vcard:hover{background:rgba(255,255,255,.08);transform:translateY(-3px)}
.vic{color:var(--b300);font-size:18px;font-weight:700;margin-bottom:8px}
.vtit{font-family:var(--serif);font-size:15px;font-weight:700;color:#fff;margin-bottom:5px}
.vdesc{font-size:12px;color:rgba(255,255,255,.5);line-height:1.65}
@media(max-width:900px){.about-in{grid-template-columns:1fr;gap:36px}.about{border-radius:24px;margin:0 12px}}
@media(max-width:600px){.vgrid{grid-template-columns:1fr}}

/* ═══ PROCESS ═══ */
.proc{padding:110px 0}
.prgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:54px}
.prcard{padding:28px 22px;border-radius:var(--rad);border:1px solid var(--bg3);background:#fff;transition:all .4s}
.prcard:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.05);border-color:var(--b300)}
.prnum{font-family:var(--serif);font-size:36px;font-weight:700;color:var(--b200);margin-bottom:14px}
.prcard:hover .prnum{color:var(--b400)}
.prtit{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--txt);margin-bottom:8px}
.prdesc{font-size:12px;color:var(--txt3);line-height:1.75}
@media(max-width:900px){.prgrid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.prgrid{grid-template-columns:1fr}}

/* ═══ GALLERY ═══ */
.gal{padding:110px 0;background:var(--bg2)}
.ggrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:54px}
.gitem{aspect-ratio:4/3;border-radius:var(--rad);overflow:hidden;position:relative;cursor:pointer;transition:transform .4s}
.gitem:hover{transform:scale(1.01)}
.gitem img{width:100%;height:100%;object-fit:cover}
.gitem-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-size:14px;color:var(--txt2)}
.gitem::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(14,77,110,.6));border-radius:var(--rad);opacity:0;transition:opacity .3s}
.gitem:hover::after{opacity:1}
.gcap{position:absolute;bottom:14px;left:14px;color:#fff;font-size:13px;font-weight:600;z-index:2;opacity:0;transform:translateY(6px);transition:all .3s}
.gitem:hover .gcap{opacity:1;transform:translateY(0)}
@media(max-width:768px){.ggrid{grid-template-columns:repeat(2,1fr)}}

/* ═══ CERTS ═══ */
.certs{padding:52px 28px;text-align:center}
.certs-row{display:flex;justify-content:center;gap:28px;flex-wrap:wrap;margin-top:20px}
.cbadge{width:76px;height:76px;border-radius:var(--rad);background:var(--b50);border:1px solid var(--b200);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--b600);text-align:center;padding:8px;line-height:1.25;transition:all .3s}
.cbadge:hover{background:var(--b100);transform:scale(1.06)}

/* ═══ CONTACT ═══ */
.contact{padding:110px 0}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:52px;margin-top:52px}
.cform{display:flex;flex-direction:column;gap:16px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fin{width:100%;padding:14px 18px;border:2px solid var(--bg3);border-radius:12px;font-size:14px;font-family:var(--sans);transition:all .3s;background:#fff;color:var(--txt);outline:0}
.fin:focus{border-color:var(--b400);box-shadow:0 0 0 3px rgba(14,105,152,.08)}
.fin::placeholder{color:var(--txt3)}
textarea.fin{min-height:125px;resize:vertical}
.cinfo{display:flex;flex-direction:column;gap:18px}
.icard{padding:22px;background:var(--b50);border-radius:var(--rad);display:flex;align-items:flex-start;gap:14px}
.iicon{width:42px;height:42px;background:var(--b600);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0}
.ilab{font-weight:600;color:var(--txt);font-size:12px;margin-bottom:2px}
.ival{color:var(--txt2);font-size:13px}
.hcard2{padding:18px 22px;background:var(--b700);border-radius:var(--rad);color:#fff}
.hcard2 b{font-size:12px;display:block;margin-bottom:6px}
.hcard2 span{font-size:12px;opacity:.7;line-height:1.7}
.fok{display:none;padding:18px;background:var(--b50);border:2px solid var(--b400);border-radius:var(--rad);text-align:center;color:var(--b600);font-weight:600}
.fok.show{display:block}
@media(max-width:900px){.cgrid{grid-template-columns:1fr}}
@media(max-width:600px){.frow{grid-template-columns:1fr}}

/* ═══ FOOTER ═══ */
.ft{background:var(--txt);color:rgba(255,255,255,.6);padding:68px 28px 24px;border-radius:32px 32px 0 0}
.ft-in{max-width:var(--mw);margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px}
.ft-logo{font-size:18px;font-weight:700;color:#fff;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ft-logo .dot{width:8px;height:8px;background:var(--b400);border-radius:50%}
.ft-logo b{color:var(--b400)}
.ft-logo img{height:30px}
.ft-desc{font-size:12px;line-height:1.7;max-width:280px}
.ft-t{color:rgba(255,255,255,.35);font-weight:600;font-size:10px;margin-bottom:16px;letter-spacing:2px;text-transform:uppercase}
.ft-links li{margin-bottom:8px}
.ft-links a{font-size:12px;color:rgba(255,255,255,.45);transition:color .3s;cursor:pointer}
.ft-links a:hover{color:var(--b400)}
.ft-bot{max-width:var(--mw);margin:36px auto 0;padding-top:18px;border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.ft-copy{font-size:11px;color:rgba(255,255,255,.25)}
.ft-soc{display:flex;gap:8px}
.ft-soc a{width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:11px;color:rgba(255,255,255,.4);transition:all .3s}
.ft-soc a:hover{background:var(--b600);border-color:var(--b600);color:#fff}
@media(max-width:900px){.ft-in{grid-template-columns:1fr 1fr}.ft{border-radius:24px 24px 0 0}}
@media(max-width:600px){.ft-in{grid-template-columns:1fr}}

.wa{position:fixed;bottom:22px;right:22px;z-index:999;width:56px;height:56px;border-radius:50%;background:#25d366;color:#fff;border:0;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 5px 20px rgba(37,211,102,.3);transition:all .3s}
.wa:hover{transform:scale(1.1)}
.lb{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;padding:32px}
.lb.open{display:flex}.lb img{max-width:90vw;max-height:85vh;border-radius:var(--rad);object-fit:contain}
.lb-x{position:absolute;top:18px;right:22px;color:#fff;font-size:28px;background:0;border:0;cursor:pointer}
</style>
</head>
<body>
<nav class="nav" id="nav"><div class="wrap ni">
  <a class="nlogo" href="#home" id="nlogo"><img id="nlogo-img" src="" alt=""><span id="nlogo-txt"><span class="dot"></span><span>DCEvel <b>US</b></span></span></a>
  <ul class="nlinks" id="nlinks"></ul>
  <div class="nright">
    <div class="lsw"><button class="lbtn on" id="bEs" onclick="setL('es')">ES</button><button class="lbtn" id="bEn" onclick="setL('en')">EN</button></div>
    <button class="hbg" id="hbg" onclick="togM()"><span id="h1"></span><span id="h2"></span><span id="h3"></span></button>
  </div>
</div><div class="mmenu" id="mm"></div></nav>

<section class="hero" id="home">
  <div class="hero-shapes"><div class="c1"></div><div class="c2"></div><div class="c3"></div></div>
  <div class="hero-c">
    <div>
      <div class="hero-tag r" id="htag"></div>
      <h1 class="r d1" id="htit"></h1>
      <p class="sub r d2" id="hsub"></p>
      <div class="hero-btns r d3"><a class="btn bp" href="#products" id="hb1"></a><a class="btn bo" href="#contact" id="hb2"></a></div>
    </div>
    <div class="hero-vis r ri">
      <div class="hcard" id="hcard"><div class="hcard-ph"><span class="em">🍌</span><span class="lb">Premium Import</span></div></div>
      <div class="hcard-badge" style="top:12%;left:-8%"><span class="bdot"></span> FDA Registered</div>
      <div class="hcard-badge" style="bottom:15%;right:-6%"><span class="bdot"></span> <span id="hstates">15+ States</span></div>
    </div>
  </div>
</section>

<div style="padding:0 28px"><div class="stats r" id="stats"></div></div>

<section class="prods" id="products"><div class="wrap">
  <div class="tc"><div class="tag r" id="ptag"></div><h2 class="stitle r d1" id="ptit"></h2><p class="ssub mx r d2" id="psub"></p></div>
  <div class="pgrid" id="pgrid"></div>
</div></section>

<section class="about" id="about"><div class="wrap about-in">
  <div class="r l"><div class="tag" id="atag"></div><h2 class="stitle" id="atit"></h2><div class="about-txt" id="atxt"></div></div>
  <div class="vgrid" id="vgrid"></div>
</div></section>

<section class="proc" id="process"><div class="wrap">
  <div class="tc"><div class="tag r" id="prtag"></div><h2 class="stitle r d1" id="prtit"></h2><p class="ssub mx r d2" id="prsub"></p></div>
  <div class="prgrid" id="prgrid"></div>
</div></section>

<section class="gal" id="gallery"><div class="wrap">
  <div class="tc"><div class="tag r" id="gtag"></div><h2 class="stitle r d1" id="gtit"></h2><p class="ssub mx r d2" id="gsub"></p></div>
  <div class="ggrid" id="ggrid"></div>
</div></section>

<div class="certs r"><div class="tag">CERTIFICATIONS</div><div class="certs-row" id="certs"></div></div>

<section class="contact" id="contact"><div class="wrap">
  <div class="tc"><div class="tag r" id="ctag"></div><h2 class="stitle r d1" id="ctit"></h2><p class="ssub mx r d2" id="csub"></p></div>
  <div class="cgrid">
    <div class="r l"><form class="cform" id="cform" onsubmit="return sendForm(event)"><div class="frow"><input class="fin" name="name" required id="fn"><input class="fin" name="email" type="email" required id="fe"></div><div class="frow"><input class="fin" name="company" id="fc"><input class="fin" name="country" id="fco"></div><textarea class="fin" name="message" required id="fm"></textarea><button type="submit" class="btn bp" style="align-self:flex-start" id="fsend"></button></form><div class="fok" id="fok"></div></div>
    <div class="cinfo r ri" id="cinfo"></div>
  </div>
</div></section>

<footer class="ft"><div class="ft-in">
  <div><div class="ft-logo" id="ft-logo"><span class="dot"></span> DCEvel <b>US</b></div><p class="ft-desc" id="fdesc"></p></div>
  <div><div class="ft-t" id="flt"></div><ul class="ft-links" id="flinks"></ul></div>
  <div><div class="ft-t" id="fct"></div><ul class="ft-links" id="fclinks"></ul></div>
  <div><div class="ft-t">Certifications</div><ul class="ft-links" id="fcerts"></ul></div>
</div><div class="ft-bot"><span class="ft-copy">&copy; 2026 DCEvel US LLC. <span id="frights"></span></span><div class="ft-soc" id="fsoc"></div></div></footer>

<a class="wa" id="wa" target="_blank" rel="noopener" title="WhatsApp">💬</a>
<div class="lb" id="lbox" onclick="clsLb()"><button class="lb-x" onclick="clsLb()">×</button><img id="lbimg" src="" alt=""></div>

<script>
let D,L=localStorage.getItem('lang')||'en';
const NAV={es:{home:'Inicio',products:'Productos',about:'Nosotros',process:'Proceso',gallery:'Galería',contact:'Contacto'},en:{home:'Home',products:'Products',about:'About',process:'Process',gallery:'Gallery',contact:'Contact'}};
const UI={es:{links:'Navegación',contacto:'Contacto',rights:'Todos los derechos reservados.',hours:'Horario',htxt:'Lun–Vie: 9:00 AM–6:00 PM EST',ok:'¡Mensaje enviado!',wa:'Hola, necesito información sobre importación de frutas.',fn:'Nombre',fe:'Email',fc:'Empresa',fco:'Ciudad / Estado',fm:'Su mensaje',fs:'Enviar mensaje',dir:'Dirección',tel:'Teléfono'},en:{links:'Navigation',contacto:'Contact',rights:'All rights reserved.',hours:'Business hours',htxt:'Mon–Fri: 9:00 AM–6:00 PM EST',ok:'Message sent successfully!',wa:'Hello, I need information about fruit imports.',fn:'Full name',fe:'Email',fc:'Company',fco:'City / State',fm:'Your message',fs:'Send message',dir:'Address',tel:'Phone'}};
const GC=['#e0f3fb','#f0f9ff','#e8f4f8','#dbeafe','#e0f2fe','#ecfeff'],GI=['🌴','📋','🚢','🏭','🛒','👥'];
function t(o){return o?(o[L]||o.en||o.es||''):''}
function $(id){return document.getElementById(id)}
function imgExists(s){return s&&s.indexOf('.')>0}

fetch('content.json?_='+Date.now()).then(r=>r.json()).then(d=>{D=d;render()}).catch(e=>console.error(e));
function setL(l){L=l;localStorage.setItem('lang',l);document.documentElement.lang=l;$('bEs').className='lbtn'+(l==='es'?' on':'');$('bEn').className='lbtn'+(l==='en'?' on':'');render()}

function render(){
  if(!D)return;const u=UI[L],n=NAV[L],secs=['home','products','about','process','gallery','contact'];
  $('nlinks').innerHTML=secs.map(s=>`<li><a href="#${s}" onclick="clsM()">${n[s]}</a></li>`).join('');
  $('mm').innerHTML=secs.map(s=>`<a href="#${s}" onclick="clsM()">${n[s]}</a>`).join('');
  if(D.empresa.logo&&imgExists(D.empresa.logo)){$('nlogo-img').src=D.empresa.logo;$('nlogo-img').style.display='block';$('nlogo-txt').style.display='none';$('ft-logo').innerHTML=`<img src="${D.empresa.logo}" alt="${D.empresa.nombre}" style="height:30px">`}
  $('htag').textContent=t(D.hero.etiqueta);$('htit').textContent=t(D.hero.titulo);$('hsub').textContent=t(D.hero.subtitulo);$('hb1').textContent=t(D.hero.boton1);$('hb2').textContent=t(D.hero.boton2);
  $('stats').innerHTML=D.estadisticas.map(s=>`<div class="st-i"><div class="st-v">${s.valor}</div><div class="st-l">${t(s.texto)}</div></div>`).join('');
  $('ptag').textContent=t(D.productos.etiqueta);$('ptit').textContent=t(D.productos.titulo);$('psub').textContent=t(D.productos.subtitulo);
  $('pgrid').innerHTML=D.productos.lista.map((p,i)=>{const h=imgExists(p.imagen);return`<div class="pcard r d${i+1}"><div class="pimg">${h?`<img src="${p.imagen}" alt="${t(p.nombre)}" loading="lazy">`:`<div class="pimg-ph">${p.emoji||'🍎'}</div>`}</div><div class="pbody"><h3 class="pname">${t(p.nombre)}</h3><p class="pdesc">${t(p.descripcion)}</p><div class="pfeats">${p.caracteristicas.map(f=>`<span class="pfeat">${t(f)}</span>`).join('')}</div></div></div>`}).join('');
  $('atag').textContent=t(D.nosotros.etiqueta);$('atit').textContent=t(D.nosotros.titulo);$('atxt').innerHTML=D.nosotros.parrafos.map(p=>`<p>${t(p)}</p>`).join('');
  $('vgrid').innerHTML=D.nosotros.valores.map((v,i)=>`<div class="vcard r ri d${i+1}"><div class="vic">${v.icono}</div><div class="vtit">${t(v.titulo)}</div><div class="vdesc">${t(v.desc)}</div></div>`).join('');
  $('prtag').textContent=t(D.proceso.etiqueta);$('prtit').textContent=t(D.proceso.titulo);$('prsub').textContent=t(D.proceso.subtitulo);
  $('prgrid').innerHTML=D.proceso.pasos.map((s,i)=>`<div class="prcard r d${i+1}"><div class="prnum">${s.num}</div><h3 class="prtit">${t(s.titulo)}</h3><p class="prdesc">${t(s.desc)}</p></div>`).join('');
  $('gtag').textContent=t(D.galeria.etiqueta);$('gtit').textContent=t(D.galeria.titulo);$('gsub').textContent=t(D.galeria.subtitulo);
  $('ggrid').innerHTML=D.galeria.imagenes.map((g,i)=>{const c=GC[i%6],h=imgExists(g.src);return`<div class="gitem r d${(i%3)+1}" onclick="opLb('${h?g.src:''}')">${h?`<img src="${g.src}" alt="${t(g.texto)}" loading="lazy">`:`<div class="gitem-ph" style="background:${c}"><span style="font-size:36px">${GI[i]||'🍃'}</span></div>`}<div class="gcap">${t(g.texto)}</div></div>`}).join('');
  $('certs').innerHTML=(D.certificaciones||[]).map(c=>`<div class="cbadge">${c}</div>`).join('');
  $('ctag').textContent=t(D.contacto.etiqueta);$('ctit').textContent=t(D.contacto.titulo);$('csub').textContent=t(D.contacto.subtitulo);
  $('fn').placeholder=u.fn;$('fe').placeholder=u.fe;$('fc').placeholder=u.fc;$('fco').placeholder=u.fco;$('fm').placeholder=u.fm;$('fsend').textContent=u.fs;$('fok').textContent=u.ok;
  $('cinfo').innerHTML=`<div class="icard"><div class="iicon">📍</div><div><div class="ilab">${u.dir}</div><div class="ival">${t(D.empresa.direccion)}</div></div></div><div class="icard"><div class="iicon">📞</div><div><div class="ilab">${u.tel}</div><div class="ival">${D.empresa.telefono}</div></div></div><div class="icard"><div class="iicon">✉️</div><div><div class="ilab">Email</div><div class="ival">${D.empresa.email}</div></div></div><div class="hcard2"><b>🕐 ${u.hours}</b><span>${u.htxt}</span></div>`;
  $('fdesc').textContent=t(D.nosotros.parrafos[0]);$('flt').textContent=u.links;$('flinks').innerHTML=secs.map(s=>`<li><a href="#${s}">${n[s]}</a></li>`).join('');$('fct').textContent=u.contacto;$('fclinks').innerHTML=`<li><a>${t(D.empresa.direccion)}</a></li><li><a href="tel:${D.empresa.telefono}">${D.empresa.telefono}</a></li><li><a href="mailto:${D.empresa.email}">${D.empresa.email}</a></li>`;$('fcerts').innerHTML=(D.certificaciones||[]).slice(0,4).map(c=>`<li><a>${c}</a></li>`).join('');$('frights').textContent=u.rights;
  const so=D.empresa.redes||{};$('fsoc').innerHTML=(so.facebook?`<a href="${so.facebook}" target="_blank">f</a>`:'')+(so.instagram?`<a href="${so.instagram}" target="_blank">ig</a>`:'')+(so.linkedin?`<a href="${so.linkedin}" target="_blank">in</a>`:'');
  $('wa').href=`https://wa.me/${D.empresa.whatsapp||'13051234567'}?text=${encodeURIComponent(u.wa)}`;
  obs();
}

window.addEventListener('scroll',()=>{$('nav').classList.toggle('s',scrollY>50)});
let mo=false;function togM(){mo=!mo;$('mm').classList.toggle('open',mo);$('h1').style.transform=mo?'rotate(45deg) translate(5px,5px)':'';$('h2').style.opacity=mo?'0':'1';$('h3').style.transform=mo?'rotate(-45deg) translate(5px,-5px)':''}
function clsM(){if(mo)togM()}
function obs(){const o=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('v');o.unobserve(e.target)}})},{threshold:.1});document.querySelectorAll('.r:not(.v)').forEach(el=>o.observe(el))}
function opLb(s){if(!s)return;$('lbimg').src=s;$('lbox').classList.add('open');document.body.style.overflow='hidden'}
function clsLb(){$('lbox').classList.remove('open');document.body.style.overflow=''}
function sendForm(e){e.preventDefault();const f=e.target,fd=new FormData(f);const msg=`*New web contact*%0A👤 ${fd.get('name')}%0A📧 ${fd.get('email')}%0A🏢 ${fd.get('company')||'—'}%0A📍 ${fd.get('country')||'—'}%0A💬 ${fd.get('message')}`;window.open(`https://wa.me/${D.empresa.whatsapp}?text=${msg}`,'_blank');f.style.display='none';$('fok').classList.add('show');return false}
</script>
</body>
</html>
